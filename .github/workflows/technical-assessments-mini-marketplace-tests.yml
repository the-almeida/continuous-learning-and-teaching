name: Technical Assessments — Mini Marketplace Tests

on:
  pull_request:
    branches: [main]
    paths:
      - "technical-acessments/fullstack-mini-marketplace/**"
      - ".github/workflows/technical-assessments-mini-marketplace-tests.yml"

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: marketplace_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: marketplace_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      JWT_SECRET: ci-test-secret
      JWT_EXPIRES_IN: 7d
      PORT: 3001

    defaults:
      run:
        working-directory: technical-acessments/fullstack-mini-marketplace/backend

    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.2.0
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: technical-acessments/fullstack-mini-marketplace/backend/package-lock.json
      - run: npm ci
      - run: npm test

  frontend:
    name: Frontend Tests + Build
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      API_URL: http://localhost:3001

    defaults:
      run:
        working-directory: technical-acessments/fullstack-mini-marketplace/frontend

    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.2.0
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: technical-acessments/fullstack-mini-marketplace/frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
